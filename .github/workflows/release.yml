name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.2.3)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}"
          if (-not $v) { $v = "${{ github.ref_name }}" -replace '^v','' }
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Building version $v"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer (fetch ffmpeg + publish + compile)
        shell: pwsh
        run: ./scripts/build-installer.ps1 -Version "${{ steps.ver.outputs.version }}"

      # Portable single-file exe (ffmpeg already fetched into Resources by the step above,
      # so it's embedded). Compressed to keep the one-file download reasonable.
      - name: Publish portable single-file exe
        shell: pwsh
        run: |
          dotnet publish src/Aquashot/Aquashot.csproj -c Release -r win-x64 --self-contained `
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true -p:Version="${{ steps.ver.outputs.version }}" `
            -o publish-portable
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item publish-portable/Aquashot.exe "dist/Aquashot-${{ steps.ver.outputs.version }}-portable.exe"
          Get-ChildItem dist -Filter *.exe | ForEach-Object { "{0}  ({1:N1} MB)" -f $_.Name, ($_.Length/1MB) }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Aquashot ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: dist/*.exe
          body: |
            Aquashot ${{ steps.ver.outputs.version }} for Windows. Two downloads:

            - **Installer** — `Aquashot-${{ steps.ver.outputs.version }}-Setup.exe`: download and run.
            - **Portable** — `Aquashot-${{ steps.ver.outputs.version }}-portable.exe`: single file, just run it (no install).

            Both are self-contained — no .NET runtime needed — and bundle FFmpeg for GIF/MP4 recording.
            (The portable exe still stores settings/history under `%LOCALAPPDATA%\Aquashot`.)

            > These binaries bundle a GPL FFmpeg build and are therefore distributed under the GPL.
            > Aquashot's own source remains WTFPL. See THIRD-PARTY-NOTICES.md.
